<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoDash – Real-Time Market Tracker</title>
  <meta name="description" content="Track live cryptocurrency prices with charts, favorites, gainers, losers, and currency conversion.">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/dashboard.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div id="header"></div>

  <main class="dashboard">

    <section class="hero">
      <div class="hero-badge"><span class="live-dot"></span> Live Data</div>
      <h1>Crypto<span>Dash</span></h1>
      <p>Track live cryptocurrency market data in real-time.</p>
    </section>

    <section class="search-section">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" placeholder="Search bitcoin, ethereum, solana... (press Enter)">
      </div>
      <p class="search-hint">↵ press Enter to search</p>
    </section>

    <div id="loading" class="loading hidden">
      <div class="spinner"></div>
      <p>Loading market data...</p>
    </div>

    <section id="results"></section>

    <section class="widgets-grid">
      <div class="widget-card">
        <h2>💱 USD → INR Converter</h2>
        <div class="converter-box">
          <input type="number" id="usdInput" placeholder="Enter USD amount">
          <button id="convertBtn">Convert</button>
        </div>
        <p id="inrResult">₹0</p>
      </div>
      <div class="widget-card">
        <h2>🚀 Top Gainers (24h)</h2>
        <ul id="gainers"></ul>
      </div>
      <div class="widget-card">
        <h2>📉 Top Losers (24h)</h2>
        <ul id="losers"></ul>
      </div>
    </section>

    <section id="favorites" class="favorites-section">
      <h2>⭐ My Favorites</h2>
      <ul id="favList"></ul>
    </section>

    <section class="chart-section">
      <canvas id="priceChart"></canvas>
    </section>

  </main>

  <div id="footer"></div>

  <script src="../js/loader.js"></script>
  <script type="module" src="../js/dashboard.js"></script>

</body>
</html>
